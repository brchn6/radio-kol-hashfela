name: Validate iOS app

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build iOS app without signing
        run: |
          xcodebuild \
            -project ios/RadioKolHashfela.xcodeproj \
            -scheme RadioKolHashfela \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
